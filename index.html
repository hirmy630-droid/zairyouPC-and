<html lang="ja">
<head>

    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap');
        
        :root {
            --ios-bg: #000000;
            --ios-secondary-bg: #1c1c1e;
            --ios-tertiary-bg: #000000; 
            --ios-quaternary-bg: #000000; 
            --ios-blue: #0a84ff;
            --ios-green: #30d158;
            --ios-orange: #f97316;
            --ios-purple: #bf5af2;
            --ios-text: #ffffff;
            --ios-text-secondary: #8e8e93;
            --ios-separator: #52525b;
            /* 面積計算用 */
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body { 
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: var(--ios-bg); 
            font-size: 15px; 
            color: var(--ios-text); 
            height: 100vh;
            overflow: hidden; 
            overscroll-behavior: none;
            font-variant-ligatures: none;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        
        input::placeholder { font-size: 15px !important; font-weight: 400; color: #71717a !important; line-height: normal; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        
        .btn-3d { 
            transition: all 0.1s; 
            position: relative; 
            top: 0; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            font-weight: 700;
            border-bottom-width: 4px;
        }
        .btn-3d:active { transform: translateY(2px); border-bottom-width: 0 !important; }
        
        .btn-3d-orange { background-color: var(--ios-orange) !important; border-bottom-color: #9a3412 !important; }
        .btn-3d-blue { background-color: var(--ios-blue) !important; border-bottom-color: #005bb5 !important; }
        .btn-3d-zinc { background: #3f3f46; border-bottom-color: #18181b; }
        .btn-3d-silver { background: #d4d4d8; border-bottom-color: #71717a; color: #444; }
        .btn-3d-red { background: #dc2626; border-bottom-color: #7f1d1d; }
        .btn-3d-gray { background: #8e8e93; border-bottom-color: #636366; }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .animate-fade-in { animation: fadeIn 0.15s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .unified-input-row { 
            background-color: var(--ios-tertiary-bg); 
            border: 1px solid var(--ios-separator) !important; 
            border-radius: 12px; 
            height: 3rem; 
            display: flex; 
            align-items: center; 
            padding: 0 1rem; 
            transition: all 0.2s ease; 
        }
        .unified-input-row:focus-within { border-color: var(--ios-orange) !important; border-width: 2px !important; }
        .unified-label-left { font-size: 14px; font-weight: 700; color: var(--ios-text-secondary); flex-shrink: 0; display: flex; align-items: center; }
        
        .unified-input-center { 
            background: transparent; 
            border: none; 
            color: var(--ios-text); 
            width: 100%; 
            height: 100%; 
            font-size: 20px; 
            font-weight: 700; 
            text-align: center; 
            outline: none; 
            padding: 0; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .unified-input-row.focus-blue:focus-within { border-color: var(--ios-blue) !important; }
        .unified-input-row.focus-green:focus-within { border-color: var(--ios-green) !important; }
        .unified-input-row.focus-orange:focus-within { border-color: var(--ios-orange) !important; }

        .ios-card-base { background: #1c1c1e; border-radius: 18px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); border: 1px solid #3a3a3c; }
        .history-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .history-table th { padding: 8px 4px; border-bottom: 3px solid var(--ios-separator); font-size: 15px; text-align: center; vertical-align: middle; }
        .history-table td { padding: 4px 4px; border-bottom: 1px solid var(--ios-separator); vertical-align: middle; text-align: center; }

        .canvas-container { border: 1px solid #38383a; border-radius: 12px; overflow: hidden; background-color: #000000; width: 100%; position: relative; }
        canvas { width: 100%; height: auto; display: block; }

        .alloc-input-field {
            background-color: #2c2c2e;
            border: 1px solid var(--ios-separator) !important;
            color: var(--ios-text);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;

        .alloc-input-field:focus {

        .alloc-input-field::placeholder { font-size: 15px !important; font-weight: normal; }

            background: transparent; border: none; color: white; font-weight: bold; width: 100%; padding: 2px 4px; border-radius: 4px;

        .alloc-memo-dropdown-item {

        }

        /* 面積計算用の特有スタイル */
        .toast-msg {
            position: fixed; top: 110px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); color: #000; padding: 14px 24px;

            box-shadow: 0 10px 24px rgba(0,0,0,0.35); white-space: nowrap; z-index: 1000;
            pointer-events: none; transition: opacity 0.3s ease;
        }

    </style>
</head>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        const unformat = (val) => val ? val.toString().replace(/,/g, '') : '';
        const toNum = (val) => parseFloat(unformat(val)) || 0;
        const format = (val) => {
            if (val === '' || val === undefined || val === null) return '';
            const clean = unformat(val);
            const num = parseFloat(clean);
            return isNaN(num) ? val : Math.round(num).toLocaleString();
        };
        const getStored = (key, fallback) => {
            const item = localStorage.getItem(key);
            try { return item ? JSON.parse(item) : fallback; } catch(e) { return fallback; }
        };
        const excelMod = (n, d) => d === 0 ? 0 : n - d * Math.floor(n / d);

        const APPS = ['calc', 'alloc', 'tightframe', 'kanamono', 'slope', 'area'];
        const APP_NAMES = { 'calc': '役物', 'alloc': '材料', 'tightframe': '屋根', 'kanamono': '金物', 'slope': '勾配', 'area': '面積' };

        const Icon = ({ name, size = 24, className = "" }) => {
            const paths = {

                rotate: <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />,
                trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />,
                x: <path d="M18 6 6 18M6 6l12 12" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />,
                plus: <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />,
                chevron: <path d="m6 9 6 6 6-6" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />

            return (
                <svg width={size} height={size} viewBox="0 0 24 24" className={className} xmlns="http://www.w3.org/2000/svg">
                    {paths[name] || null}
                </svg>
            );
        };

        const RoofProfileSVG = ({ size }) => {
            if (size === '600') {
                return (

                        <line x1="40" y1="20" x2="610" y2="20" stroke="#8e8e93" strokeWidth="1" />
                        <line x1="40" y1="15" x2="40" y2="25" stroke="#8e8e93" strokeWidth="1" />
                        <line x1="610" y1="15" x2="610" y2="25" stroke="#8e8e93" strokeWidth="1" />
                        <text x="325" y="15" fill="#8e8e93" fontSize="14" fontWeight="bold" textAnchor="middle">600</text>
                        <line x1="40" y1="40" x2="230" y2="40" stroke="#8e8e93" strokeWidth="1" />
                        <line x1="230" y1="40" x2="420" y2="40" stroke="#8e8e93" strokeWidth="1" />
                        <line x1="420" y1="40" x2="610" y2="40" stroke="#8e8e93" strokeWidth="1" />
                        <text x="135" y="35" fill="#8e8e93" fontSize="12" textAnchor="middle">200</text>
                        <text x="325" y="35" fill="#8e8e93" fontSize="12" textAnchor="middle">200</text>
                        <text x="515" y="35" fill="#8e8e93" fontSize="12" textAnchor="middle">200</text>
                        <polyline points="10,80 20,50 60,50 115,140 155,140 210,50 250,50 305,140 345,140 400,50 440,50 495,140 535,140 590,50 630,50 640,80" fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinejoin="round" />
                        <line x1="40" y1="45" x2="40" y2="80" stroke="#8e8e93" strokeWidth="1" strokeDasharray="3,3" />
                        <text x="40" y="95" fill="#8e8e93" fontSize="12" textAnchor="middle">33.5</text>
                        <text x="135" y="160" fill="#8e8e93" fontSize="12" textAnchor="middle">35</text>
                        <text x="325" y="160" fill="#8e8e93" fontSize="12" textAnchor="middle">35</text>
                        <text x="515" y="160" fill="#8e8e93" fontSize="12" textAnchor="middle">35</text>
                        <text x="230" y="90" fill="#8e8e93" fontSize="12" textAnchor="middle">35</text>
                        <text x="420" y="90" fill="#8e8e93" fontSize="12" textAnchor="middle">35</text>
                    </svg>
                );
            } else if (size === '500') {
                return (
                    <svg viewBox="0 0 560 220" className="w-full h-full text-white drop-shadow-md">
                        <line x1="30" y1="20" x2="530" y2="20" stroke="#8e8e93" strokeWidth="1" />
                        <line x1="30" y1="15" x2="30" y2="25" stroke="#8e8e93" strokeWidth="1" />
                        <line x1="530" y1="15" x2="530" y2="25" stroke="#8e8e93" strokeWidth="1" />
                        <text x="280" y="15" fill="#8e8e93" fontSize="14" fontWeight="bold" textAnchor="middle">500</text>
                        <line x1="30" y1="200" x2="280" y2="200" stroke="#8e8e93" strokeWidth="1" />
                        <line x1="280" y1="200" x2="530" y2="200" stroke="#8e8e93" strokeWidth="1" />
                        <text x="155" y="215" fill="#8e8e93" fontSize="12" textAnchor="middle">250</text>
                        <text x="405" y="215" fill="#8e8e93" fontSize="12" textAnchor="middle">250</text>
                        <polyline points="15,60 20,40 60,40 135,170 175,170 260,40 300,40 375,170 415,170 500,40 540,40 545,60" fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinejoin="round" />
                        <line x1="30" y1="40" x2="30" y2="195" stroke="#8e8e93" strokeWidth="1" strokeDasharray="3,3" />
                        <line x1="280" y1="40" x2="280" y2="195" stroke="#8e8e93" strokeWidth="1" strokeDasharray="3,3" />
                        <text x="40" y="35" fill="#8e8e93" fontSize="12" textAnchor="middle">38</text>
                        <text x="280" y="35" fill="#8e8e93" fontSize="12" textAnchor="middle">38</text>
                        <text x="155" y="185" fill="#8e8e93" fontSize="12" textAnchor="middle">38</text>
                        <text x="395" y="185" fill="#8e8e93" fontSize="12" textAnchor="middle">38</text>
                        <line x1="10" y1="40" x2="20" y2="40" stroke="#8e8e93" strokeWidth="1" />
                        <line x1="10" y1="170" x2="135" y2="170" stroke="#8e8e93" strokeWidth="1" strokeDasharray="3,3" />
                        <text x="20" y="110" fill="#8e8e93" fontSize="12" textAnchor="end">150</text>
                    </svg>
                );
            } else if (size === '1000') {
                return (
                    <svg viewBox="0 0 540 220" className="w-full h-full text-white drop-shadow-md">
                        <line x1="40" y1="20" x2="500" y2="20" stroke="#8e8e93" strokeWidth="1" />
                        <line x1="40" y1="15" x2="40" y2="25" stroke="#8e8e93" strokeWidth="1" />
                        <line x1="500" y1="15" x2="500" y2="25" stroke="#8e8e93" strokeWidth="1" />
                        <text x="270" y="15" fill="#8e8e93" fontSize="14" fontWeight="bold" textAnchor="middle">500</text>
                        <polyline points="20,70 30,50 45,50 45,70 70,70 160,190 380,190 470,70 510,70 510,50 490,50 490,80" fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinejoin="round" />
                        <line x1="40" y1="20" x2="40" y2="210" stroke="#8e8e93" strokeWidth="1" strokeDasharray="3,3" />
                        <line x1="500" y1="20" x2="500" y2="210" stroke="#8e8e93" strokeWidth="1" strokeDasharray="3,3" />
                        <text x="270" y="210" fill="#8e8e93" fontSize="14" textAnchor="middle">200</text>
                        <text x="270" y="130" fill="#8e8e93" fontSize="14" textAnchor="middle">160 / 183</text>
                        <text x="40" y="10" fill="#8e8e93" fontSize="12" textAnchor="middle">A</text>
                        <text x="500" y="10" fill="#8e8e93" fontSize="12" textAnchor="middle">B</text>
                    </svg>
                );
            }
            return null;
        };

        // --- 面積計算用コンポーネント (AreaApp) ---
        const AreaApp = ({ areaStateRef, savedData, setSavedData, showToast }) => {
            const canvasRef = useRef(null);
            const containerRef = useRef(null);
            const inputRef = useRef(null);
            
            const [areaValue, setAreaValue] = useState('--.--');
            const [slopeInput, setSlopeInput] = useState('');
            const [slopeDeg, setSlopeDeg] = useState('0.0°');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalValue, setModalValue] = useState('');
            
            const s = areaStateRef.current; // 状態アクセス用エイリアス

            const getRawCoords = (e) => {
                if(!canvasRef.current) return {x:0, y:0};
                const rect = canvasRef.current.getBoundingClientRect();
                const t = (e.touches && e.touches.length > 0) ? e.touches[0] : e;
                return { x: t.clientX - rect.left, y: t.clientY - rect.top };
            };
            const w2s = (w) => ({ x: w.x * s.zoom + s.cameraX, y: w.y * s.zoom + s.cameraY });
            const s2w = (s_coord) => ({ x: (s_coord.x - s.cameraX) / s.zoom, y: (s_coord.y - s.cameraY) / s.zoom });
            
            const distToSegment = (p, v, w) => {
                const l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
                if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
                let t = Math.max(0, Math.min(1, ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2));
                return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
            };

            const saveState = () => {
                s.actionHistory.push({
                    points: JSON.parse(JSON.stringify(s.points)), manualLengths: {...s.manualLengths}, 
                    fixedAngles: {...s.fixedAngles}, isClosed: s.isClosed, ppx: s.ppx, 
                    globalBaseAngle: s.globalBaseAngle, globalIsCW: s.globalIsCW, updateCount: s.updateCount
                });
                if (s.actionHistory.length > 50) s.actionHistory.shift();
            };

            const undo = () => {
                if (s.actionHistory.length === 0) return;
                const state = s.actionHistory.pop();
                s.points = state.points; s.manualLengths = state.manualLengths; s.fixedAngles = state.fixedAngles; 
                s.isClosed = state.isClosed; s.ppx = state.ppx; s.globalBaseAngle = state.globalBaseAngle; 
                s.globalIsCW = state.globalIsCW; s.updateCount = state.updateCount || 0;
                rebuildGeometry(false);
                draw();
            };

            const getActualAngle = (idx) => {
                const prev = s.points[(idx - 1 + s.points.length) % s.points.length];
                const curr = s.points[idx];
                const next = s.points[(idx + 1) % s.points.length];
                const angIn = Math.atan2(curr.y - prev.y, curr.x - prev.x);
                const angOut = Math.atan2(next.y - curr.y, next.x - curr.x);
                let turn = angOut - angIn;
                while (turn <= -Math.PI) turn += Math.PI * 2;
                while (turn > Math.PI) turn -= Math.PI * 2;
                let actualD = s.globalIsCW ? (180 - turn * 180 / Math.PI) : (180 + turn * 180 / Math.PI);
                while (actualD <= 0) actualD += 360;
                while (actualD > 360) actualD -= 360;
                return actualD;
            };

            const rebuildGeometry = (shouldFit = false) => {
                if (s.points.length < 3 || !s.isClosed) { setAreaValue('--.--'); return; }
                const startAnchor = { x: s.points[0].x, y: s.points[0].y };
                let logical = new Array(s.points.length); logical[0] = {x: 0, y: 0}; let curAngle = 0;
                for (let i = 0; i < s.points.length - 1; i++) {
                    let len = s.manualLengths[i] !== undefined ? s.manualLengths[i] : (Math.hypot(s.points[i+1].x - s.points[i].x, s.points[i+1].y - s.points[i].y) / s.ppx);
                    if (len < 0.01) len = 0.01;
                    logical[i+1] = { x: logical[i].x + len * Math.cos(curAngle), y: logical[i].y + len * Math.sin(curAngle) };
                    if (i < s.points.length - 2) {
                        if (s.fixedAngles[i+1] !== undefined) curAngle += (s.globalIsCW ? (180 - s.fixedAngles[i+1]) : -(180 - s.fixedAngles[i+1])) * Math.PI / 180;
                        else {
                            const a1 = Math.atan2(s.points[i+1].y - s.points[i].y, s.points[i+1].x - s.points[i].x);
                            const a2 = Math.atan2(s.points[i+2].y - s.points[i+1].y, s.points[i+2].x - s.points[i+1].x);
                            let turn = a2 - a1; while (turn < -Math.PI) turn += Math.PI * 2; while (turn > Math.PI) turn -= Math.PI * 2; curAngle += turn;
                        }
                    }
                }
                const rot = s.globalBaseAngle - Math.atan2(logical[1].y - logical[0].y, logical[1].x - logical[0].x);
                for (let i = 0; i < logical.length; i++) {
                    const p = logical[i];
                    s.points[i] = { x: (p.x * Math.cos(rot) - p.y * Math.sin(rot)) * s.ppx + startAnchor.x, y: (p.x * Math.sin(rot) + p.y * Math.cos(rot)) * s.ppx + startAnchor.y };
                }
                let area = 0;
                for (let i = 0; i < s.points.length; i++) {
                    const p1 = s.points[i], p2 = s.points[(i + 1) % s.points.length];
                    area += p1.x * p2.y - p2.x * p1.y;
                }
                setAreaValue(Math.abs(area / (2 * s.ppx * s.ppx)).toFixed(2));
                
                if (shouldFit && canvasRef.current) {
                    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                    s.points.forEach(p => { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y); });
                    const pad = 60;
                    s.zoom = Math.min((canvasRef.current.width - pad * 2) / (maxX - minX || 1), (canvasRef.current.height - pad * 2) / (maxY - minY || 1));
                    s.cameraX = canvasRef.current.width / 2 - ((minX + maxX) / 2) * s.zoom;
                    s.cameraY = canvasRef.current.height / 2 - ((minY + maxY) / 2) * s.zoom;
                }
            };

            const draw = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (s.points.length === 0) return;
                
                if (s.isClosed) {
                    ctx.beginPath(); ctx.moveTo(w2s(s.points[0]).x, w2s(s.points[0]).y); 
                    for (let i = 1; i < s.points.length; i++) ctx.lineTo(w2s(s.points[i]).x, w2s(s.points[i]).y); 
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(94, 92, 230, 0.15)'; ctx.fill();
                }
                const limit = s.isClosed ? s.points.length : s.points.length - 1;
                for (let i = 0; i < limit; i++) {

        };

        // --- メインアプリケーション ---
        function App() {
            const handleFocus = (e) => { if (e && e.target && e.target.select) e.target.select(); };
            const handleEnterKey = (e, nextRef) => { if (e.key === 'Enter') { e.preventDefault(); nextRef.current?.focus(); } };

            const [activeApp, setActiveApp] = useState(() => localStorage.getItem('activeApp') || 'calc');
            
            const mainRef = useRef(null);
            const calcInputRef = useRef(null);
            const allocCalcInputRef = useRef(null);
            const productNameRef = useRef(null);
            const stdLengthRef = useRef(null);
            const overlapRef = useRef(null);
            const totalDimRef = useRef(null);
            const allocLRef = useRef(null);
            const allocPitchRef = useRef(null);
            const allocCountRef = useRef(null);
            const allocWRef = useRef(null);
            const allocNoRef = useRef(null);
            const kanamonoPitchRef = useRef(null);

            const kanamonoLengthRef = useRef(null);
            const slopeL1Ref = useRef(null);

            const slopeWRef = useRef(null);
            const slopePitchRef = useRef(null);
            const slopeCanvasRef = useRef(null);
            const tfTotalLRef = useRef(null);
            
            const allocMemoDropdownRef = useRef(null);
            const allocMemoBtnRef = useRef(null);
            const productDropdownRef = useRef(null);
            const productBtnRef = useRef(null);

            const [currentProductName, setCurrentProductName] = useState(() => localStorage.getItem('productName') || '');
            const [stdLength, setStdLength] = useState(() => localStorage.getItem('stdLength') || '');
            const [overlap, setOverlap] = useState(() => localStorage.getItem('overlap') || '');
            const [totalDim, setTotalDim] = useState(() => localStorage.getItem('totalDim') || '');
            const [cumulativeSum, setCumulativeSum] = useState(() => toNum(localStorage.getItem('cumulativeSum') || 0));
            const [history, setHistory] = useState(() => getStored('gradient_calc_history', []));
            
            const [allocL, setAllocL] = useState(() => localStorage.getItem('allocL') || '');
            const [allocPitch, setAllocPitch] = useState(() => localStorage.getItem('allocPitch') || '');
            const [allocCount, setAllocCount] = useState(() => localStorage.getItem('allocCount') || '');
            const [allocW, setAllocW] = useState(() => localStorage.getItem('allocW') || '');

            const [allocSource, setAllocSource] = useState(() => localStorage.getItem('allocSource') || null);
            const [allocHistory, setAllocHistory] = useState(() => getStored('waritsuke_history', []));
            
            const [allocCalcInput, setAllocCalcInput] = useState('');
            const [allocCumulativeSum, setAllocCumulativeSum] = useState(() => toNum(localStorage.getItem('allocCumulativeSum') || 0));
            const [allocSumHistory, setAllocSumHistory] = useState(() => getStored('allocSumHistory', []));
            const [isAllocMemoDropdownOpen, setIsAllocMemoDropdownOpen] = useState(false);

            const [kanaPitch, setKanaPitch] = useState(() => localStorage.getItem('kanaPitch') || '');
            const [kanaCount, setKanaCount] = useState(() => localStorage.getItem('kanaCount') || '');
            const [kanaLength, setKanaLength] = useState(() => localStorage.getItem('kanaLength') || '');

            const [slopeL1, setSlopeL1] = useState(() => localStorage.getItem('slopeL1') || '');
            const [slopeL2, setSlopeL2] = useState(() => localStorage.getItem('slopeL2') || '');
            const [slopeW, setSlopeW] = useState(() => localStorage.getItem('slopeW') || '');
            const [slopePitch, setSlopePitch] = useState(() => localStorage.getItem('slopePitch') || '');

            const [tfSize, setTfSize] = useState(() => localStorage.getItem('tfSize') || '600');
            const [tfTotalL, setTfTotalL] = useState(() => localStorage.getItem('tfTotalL') || '');

            const [totalHistory, setTotalHistory] = useState(() => getStored('totalHistory', []));
            const [isClearModalOpen, setIsClearModalOpen] = useState(false);
            const [calcInput, setCalcInput] = useState('');

            const [isProductDropdownOpen, setIsProductDropdownOpen] = useState(false);

            const [zoomedImage, setZoomedImage] = useState(null); 
            const [slopeImageUrl, setSlopeImageUrl] = useState('');
            const [toastMsg, setToastMsg] = useState('');

            // --- 面積計算用の状態（タブ切り替えで消えないように保持） ---
            const areaStateRef = useRef({
                points: [], manualLengths: {}, fixedAngles: {}, isClosed: false, selectedIdx: -1, activeMode: 'edge', ppx: 60,
                actionHistory: [], cameraX: 0, cameraY: 0, zoom: 1.0, isPanning: false, lastRawPos: {x: 0, y: 0}, startRawPos: {x: 0, y: 0}, hasMoved: false,
                globalBaseAngle: 0, globalIsCW: true, initialPinchDist: null, initialZoom: 1, initialPinchCenter: null, updateCount: 0,
            });
            const [areaSavedData, setAreaSavedData] = useState(() => getStored('area_calc_data_v20_ipad', []));
            
            const showToast = useCallback((msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 1800);
            }, []);

            const materialResult = useMemo(() => {
                const total = toNum(totalDim), std = toNum(stdLength), over = toNum(overlap), effective = std - over;
                if (total > 0 && effective > 0) {
                    const pieces = Math.ceil(total / effective);
                    return { pieces, remainder: (pieces * effective) - total };
                }
                return { pieces: 0, remainder: 0 };
            }, [totalDim, stdLength, overlap]);

            const calcSummaryByName = useMemo(() => {
                const summary = {};
                history.forEach(item => {
                    const key = item.name || "（品名なし）";
                    if (!summary[key]) summary[key] = { pieces: 0, totalDistance: 0 };
                    summary[key].pieces += (item.pieces || 0);
                    summary[key].totalDistance += toNum(item.total);
                });
                return summary;
            }, [history]);

            const uniqueProductNames = useMemo(() => {
                const unique = new Set();
                for (let i = 0; i < history.length; i++) {
                    if (history[i].name && history[i].name.trim() !== "") {
                        unique.add(history[i].name.trim());
                        if (unique.size >= 5) break;
                    }
                }
                return Array.from(unique);
            }, [history]);

            const allocCalculated = useMemo(() => {
                const L = toNum(allocW), W = toNum(allocPitch), N = toNum(allocCount);
                let pitchMode = { q: '-', qRem: '-' }, countMode = { w: '-', wRem: '-' };
                if (L > 0) {
                    if (W > 0) { const q = Math.ceil(L / W); pitchMode = { q, qRem: (q * W) - L }; }
                    if (N > 0) { const w = Math.ceil(L / N); countMode = { w, wRem: (w * N) - L }; }
                }
                return { pitchMode, countMode };
            }, [allocW, allocPitch, allocCount]);

            const allocTotals = useMemo(() => {
                return allocHistory.reduce((acc, item) => {
                    const qVal = parseInt(unformat(item.q)) || 0;
                    if (item.source === 'pitch') { acc.pitchQ += qVal; }
                    if (item.source === 'count') { acc.countQ += qVal; }
                    return acc;
                }, { pitchQ: 0, countQ: 0 });
            }, [allocHistory]);

            const allocSummaryByMemo = useMemo(() => {
                const summary = {};
                allocHistory.forEach(item => {
                    const key = item.no || "（備考なし）";
                    if (!summary[key]) summary[key] = { pitch: 0, count: 0 };
                    const qVal = parseInt(unformat(item.q)) || 0;
                    if (item.source === 'pitch') { summary[key].pitch += qVal; }
                    else if (item.source === 'count') { summary[key].count += qVal; }
                });
                return summary;
            }, [allocHistory]);

            const uniqueAllocMemos = useMemo(() => {
                const unique = new Set();
                for (let i = 0; i < allocHistory.length; i++) {
                    if (allocHistory[i].no && allocHistory[i].no.trim() !== "") {
                        unique.add(allocHistory[i].no.trim());
                        if (unique.size >= 5) break;
                    }
                }
                return Array.from(unique);
            }, [allocHistory]);

            const kanamonoResults = useMemo(() => {
                const L = toNum(kanaLength), W = toNum(kanaPitch), N = toNum(kanaCount);
                let resQ = { val: '-', rem: '-' }, resW = { val: '-', rem: '-' };
                if (L > 0) {
                    if (W > 0) { const q = Math.floor(L / W) + 1; resQ = { val: q, rem: L - (W * (q - 1)) }; }
                    if (N > 1) { const w = Math.floor(L / (N - 1)); resW = { val: w, rem: L - (w * (N - 1)) }; }
                    else if (N === 1) resW = { val: 0, rem: L };
                }
                return { resQ, resW };
            }, [kanaLength, kanaPitch, kanaCount]);

            const kanamonoTableData = useMemo(() => {
                const { resQ, resW } = kanamonoResults, L = toNum(kanaLength), W = toNum(kanaPitch), N = toNum(kanaCount);
                const listQ = [], listN = [];
                if (L > 0 && W > 0 && resQ.val !== '-') { let pos = resQ.rem / 2; for (let i = 0; i < resQ.val; i++) { listQ.push(Math.round(pos)); pos += W; } }
                if (L > 0 && N > 0 && resW.val !== '-') { let pos = resW.rem / 2; for (let i = 0; i < N; i++) { listN.push(Math.round(pos)); pos += resW.val; } }
                const maxRows = Math.max(listQ.length, listN.length), rows = [];
                for (let i = 0; i < maxRows; i++) rows.push({ q: listQ[i], n: listN[i] });
                return rows;
            }, [kanaLength, kanaPitch, kanaCount, kanamonoResults]);

            const kanamonoLastRem = useMemo(() => {
                const L = toNum(kanaLength);
                let qRem = '-', nRem = '-';
                if (kanamonoTableData.length > 0) {
                    const lastQPos = kanamonoTableData.filter(r => r.q !== undefined).pop()?.q;
                    const lastNPos = kanamonoTableData.filter(r => r.n !== undefined).pop()?.n;
                    if (lastQPos !== undefined) qRem = L - lastQPos;
                    if (lastNPos !== undefined) nRem = L - lastNPos;
                }
                return { qRem, nRem };
            }, [kanamonoTableData, kanaLength]);

            const slopeResults = useMemo(() => {
                const a = toNum(slopeL1), c = toNum(slopeL2), b = toNum(slopeW), interval = toNum(slopePitch);
                if (b <= 0 || interval <= 0) return { a, b, c, interval, newB: '-', newC: '-', count: '-', step: '-', table: [] };
                const count = Math.ceil(b / interval), newB = count * interval;
                const slope = (c - a) / b, newC = a + (slope * newB), step = slope * interval;
                const table = [];
                for (let i = 0; i <= count; i++) {
                    const dist = i * interval;
                    table.push({ i, dist, height: Math.round(a + (slope * dist)) });
                }
                return { a, b, c, interval, newB, newC, count, step: Math.abs(step), table };
            }, [slopeL1, slopeL2, slopeW, slopePitch]);

            const tfResults = useMemo(() => {
                const size = parseInt(tfSize) || 600;
                const L = toNum(tfTotalL);
                let yamaDim = 0, taniDim = 0, calcSize = size;
                if (size === 600) { yamaDim = 200; taniDim = 100; calcSize = 600; }
                else if (size === 500) { yamaDim = 250; taniDim = 125; calcSize = 500; }
                else if (size === 1000) { yamaDim = 500; taniDim = 250; calcSize = 500; }
                if (L <= 0) return { centerL: '', yamaDim, taniDim, taniZan: '', yamaZan: '', table: [], count: 0, roofTaniCount: '', roofYamaCount: '', L: 0 };
                const centerL = L / 2;
                const taniZan = excelMod(centerL, yamaDim);
                const yamaZan = excelMod(centerL - taniDim, yamaDim);
                let currentTani = taniZan;
                let currentYama = yamaZan;
                let table = [];
                let count = 0;
                while (currentTani <= L || currentYama <= L) {
                    table.push({ tani: (currentTani <= L && currentTani >= 0) ? currentTani : null, yama: (currentYama <= L && currentYama >= 0) ? currentYama : null });
                    currentTani += size; currentYama += size; count++;
                    if (count > 1000) break; 
                }
                const roofTaniCount = Math.ceil((L + taniDim) / calcSize);
                const roofYamaCount = Math.ceil(L / calcSize);
                return { centerL, yamaDim, taniDim, taniZan, yamaZan, table, count, roofTaniCount, roofYamaCount, L: L };
            }, [tfSize, tfTotalL]);

            const clearDistance = () => setTotalDim('');
            const clearCalcInputs = () => { setCurrentProductName(''); setStdLength(''); setOverlap(''); setTotalDim(''); setCalcInput(''); setCumulativeSum(0); setTotalHistory([]);};
            const clearAllocInputs = () => { setAllocL(''); setAllocPitch(''); setAllocCount(''); setAllocW(''); setAllocNo(''); setAllocSource(null); };
            const clearKanamonoInputs = () => { setKanaPitch(''); setKanaCount(''); setKanaLength(''); };
            const clearSlopeInputs = () => { setSlopeL1(''); setSlopeL2(''); setSlopeW(''); setSlopePitch(''); };

            const addValue = () => {
                const val = toNum(calcInput);
                if (val > 0) {
                    setTotalHistory([...totalHistory, { sum: cumulativeSum, total: totalDim }]);
                    setCumulativeSum(prev => prev + val);
                    setTotalDim(prev => (toNum(prev) + val).toString());
                    setCalcInput(''); setTimeout(() => calcInputRef.current?.focus(), 50);
                }
            };
            
            const addAllocValue = () => {
                const val = toNum(allocCalcInput);
                if (val > 0) {
                    setAllocSumHistory([...allocSumHistory, { sum: allocCumulativeSum, total: allocW }]);
                    setAllocCumulativeSum(prev => prev + val);
                    setAllocW(prev => (toNum(prev) + val).toString());
                    setAllocCalcInput(''); setTimeout(() => allocCalcInputRef.current?.focus(), 50);
                }
            };

            const saveToHistoryManually = () => {
                if (toNum(totalDim) === 0) return;
                const pieces = materialResult.pieces;
                const newHistory = [{
                    id: Date.now().toString(),
                    name: currentProductName,
                    total: totalDim, 
                    std: stdLength, 
                    overlap: overlap, 
                    pieces: pieces, 
                    remainder: materialResult.remainder, 
                    createdAt: Date.now()
                }, ...history].slice(0, 50);
                setHistory(newHistory);
            };
            
            const saveAllocHistory = () => {
                if (toNum(allocW) === 0) return;
                if (allocSource === 'pitch' && toNum(allocPitch) === 0) return;
                if (allocSource === 'count' && toNum(allocCount) === 0) return;
                if (!allocSource) return;
                let entry = { id: Date.now().toString(), L: format(allocW), memoL: allocL, no: allocNo, source: allocSource };
                if (allocSource === 'pitch') {
                    entry = { ...entry, pitch: format(allocPitch), q: allocCalculated.pitchMode.q, rem: format(allocCalculated.pitchMode.qRem) };
                } else {
                    entry = { ...entry, count: allocCalculated.countMode.w, q: format(allocCount), rem: format(allocCalculated.countMode.wRem) };
                }
                setAllocHistory([entry, ...allocHistory]);
            };

            const loadAllocHistoryToInput = (item, source) => {
                setAllocW(item.L);
                setAllocL(item.memoL || "");
                setAllocNo(item.no || "");
                if (source === 'pitch' && item.pitch) { setAllocPitch(item.pitch); setAllocSource('pitch'); }
                else if (source === 'count' && item.count) { setAllocCount(item.count); setAllocSource('count'); }
            };

            const updateRemarkNameInAllocHistory = (oldKey, newKey) => {
                const finalOld = oldKey === "（備考なし）" ? "" : oldKey;
                const finalNew = newKey === "（備考なし）" ? "" : newKey;
                if (finalOld === finalNew) return;
                setAllocHistory(prev => prev.map(item => ((item.no || "") === finalOld ? { ...item, no: finalNew } : item)));
            };

            const deleteByRemarkInAllocHistory = (remarkKey) => {
                const targetKey = remarkKey === "（備考なし）" ? "" : remarkKey;
                setAllocHistory(prev => prev.filter(item => (item.no || "") !== targetKey));
            };

            const updateProductNameInHistory = (oldKey, newKey) => {
                const finalOld = oldKey === "（品名なし）" ? "" : oldKey;
                const finalNew = newKey === "（品名なし）" ? "" : newKey;
                if (finalOld === finalNew) return;
                setHistory(prev => prev.map(item => ((item.name || "") === finalOld ? { ...item, name: finalNew } : item)));
            };

            const deleteByNameInHistory = (nameKey) => {
                const targetKey = nameKey === "（品名なし）" ? "" : nameKey;
                setHistory(prev => prev.filter(item => (item.name || "") !== targetKey));
            };

            const openSlopeZoom = () => {
                if (slopeCanvasRef.current) {
                    setSlopeImageUrl(slopeCanvasRef.current.toDataURL('image/png'));
                    setZoomedImage('slope');
                }
            };

            const drawSlopeCanvas = () => {
                const canvas = slopeCanvasRef.current; if (!canvas) return;
                const ctx = canvas.getContext('2d'), { a, b, c, newB, newC, count, interval } = slopeResults;
                ctx.clearRect(0, 0, canvas.width, canvas.height); 
                if (toNum(slopeW) <= 0 || toNum(slopePitch) <= 0) return;
                const padding = {l:140, r:140, t:120, b:140}, scaleX = (canvas.width - (padding.l + padding.r)) / (newB || 1);
                const maxHeight = Math.max(a, newC, c);
                const scaleY = (canvas.height - (padding.t + padding.b)) / (maxHeight || 1);
                const tx = (x) => padding.l + x * scaleX, ty = (y) => canvas.height - padding.b - y * scaleY;
                ctx.beginPath(); ctx.strokeStyle = '#1c1c1e'; ctx.lineWidth = 1;
                for(let j=0; j<=maxHeight; j+=maxHeight/4) { ctx.moveTo(tx(0), ty(j)); ctx.lineTo(tx(newB), ty(j)); } ctx.stroke();
                ctx.beginPath(); ctx.strokeStyle = '#0a84ff'; ctx.lineWidth = 4;
                ctx.moveTo(tx(0), ty(0)); ctx.lineTo(tx(newB), ty(0)); ctx.stroke();
                for (let i = 0; i <= count; i++) {
                    const cx = i * interval, cy = a + ((newC - a) / newB) * cx;
                    ctx.beginPath(); ctx.strokeStyle = (i === 0 || i === count) ? '#30d158' : '#2c2c2e'; ctx.lineWidth = (i === 0 || i === count) ? 3 : 1.5;
                    ctx.moveTo(tx(cx), ty(0)); ctx.lineTo(tx(cx), ty(cy)); ctx.stroke();
                }
                ctx.setLineDash([15, 10]); ctx.strokeStyle = '#ff453a'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(tx(b), ty(0)); ctx.lineTo(tx(b), ty(c)); ctx.stroke(); ctx.setLineDash([]);
                ctx.font = "bold 32px sans-serif"; ctx.fillStyle = "#ff453a"; ctx.textAlign = "center";
                ctx.fillText(`元W: ${Math.round(b).toLocaleString()}`, tx(b), canvas.height - padding.b + 110);
                ctx.beginPath(); ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 8; ctx.lineJoin = "round"; ctx.lineCap = "round";
                ctx.moveTo(tx(0), ty(a)); ctx.lineTo(tx(newB), ty(newC)); ctx.stroke();
                ctx.font = "bold 38px sans-serif"; ctx.fillStyle = "#30d158"; ctx.textAlign = "center";
                ctx.fillText(`L1: ${Math.round(a).toLocaleString()}`, tx(0), ty(a) - 35); ctx.fillText(`L2: ${Math.round(newC).toLocaleString()}`, tx(newB), ty(newC) - 35);
                ctx.font = "bold 34px sans-serif"; ctx.textAlign = "center"; ctx.fillStyle = "#0a84ff";
                ctx.fillText(`幅: ${Math.round(newB).toLocaleString()}`, tx(newB / 2), canvas.height - padding.b + 65);
            };

            const allocInputColorClass = allocSource === 'pitch' ? 'text-[#0a84ff]' : (allocSource === 'count' ? 'text-[#30d158]' : 'text-white');

            useEffect(() => {
                localStorage.setItem('activeApp', activeApp);
                localStorage.setItem('productName', currentProductName);
                localStorage.setItem('stdLength', stdLength);
                localStorage.setItem('overlap', overlap);
                localStorage.setItem('totalDim', totalDim);

                                        <div className="space-y-4 pl-1 md:overflow-y-auto scrollbar-hide pb-10">
                                            <div className="flex justify-between items-center px-1"><h3 className="text-[18px] font-bold text-zinc-300 uppercase tracking-widest">割付墨出し寸法</h3></div>
                                            <div className="bg-[#1c1c1e] rounded-xl border border-zinc-800 overflow-hidden shadow-2xl animate-fade-in"><div className="bg-zinc-800 p-3 flex justify-between items-center border-b border-zinc-700"><h2 className="text-base font-bold text-white uppercase">割付寸法</h2><span className="bg-[#f97316] px-3 py-1 rounded-full text-black font-bold text-[14px] whitespace-nowrap uppercase font-bold">W {format(kanaLength)} ㎜</span></div><div className="w-full"><table className="history-table"><thead><tr className="bg-[#2c2c2e]"><th className="text-[#0a84ff] border-r border-[#545458] w-1/2 font-bold uppercase py-2">働き位置</th><th className="text-[#30d158] font-bold w-1/2 uppercase py-2">本数位置</th></tr></thead><tbody className="text-center font-bold text-lg">{kanamonoTableData.length === 0 ? <tr><td colSpan="2" className="py-20 text-zinc-600 italic font-bold text-[14px]">データなし</td></tr> : (<>{kanamonoTableData.map((row, idx) => (<tr key={idx} className="border-b border-[#545458]"><td className="py-2 border-r border-[#545458] text-[#0a84ff]">{row.q !== undefined ? format(row.q) : '-'}</td><td className="py-2 text-[#30d158]">{row.n !== undefined ? format(row.n) : '-'}</td></tr>))}<tr className="bg-[#2c2c2e] font-bold border-t-2 border-[#545458] text-zinc-400"><td className="py-2 border-r border-[#545458]">{kanamonoResults.resQ.val !== '-' && (<div className="flex flex-col gap-0.5"><div className="text-[14px]">余り: {format(kanamonoLastRem.qRem)}㎜</div><div className="text-[16px]">計: {kanamonoResults.resQ.val}本</div></div>)}</td><td className="py-2">{kanamonoResults.resW.val !== '-' && (<div className="flex flex-col gap-0.5"><div className="text-[14px]">余り: {format(kanamonoLastRem.nRem)}㎜</div><div className="text-[16px]">計: {format(kanaCount)}本</div></div>)}</td></tr></>)}</tbody></table></div></div>
                                        </div>
                                    </div>
                                )}

                                {activeApp === 'slope' && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 h-full overflow-hidden">
                                        <div className="space-y-6 pr-1 md:overflow-y-auto scrollbar-hide pb-10">
                                            <div className="ios-card-base p-5 space-y-4 shadow-2xl">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="unified-input-row focus-green"><span className="unified-label-left text-[#30d158]">L1</span><input ref={slopeL1Ref} type="text" inputMode="decimal" value={format(slopeL1)} onFocus={handleFocus} onChange={(e) => setSlopeL1(unformat(e.target.value))} onKeyDown={(e) => handleEnterKey(e, slopeL2Ref)} className="unified-input-center text-[#30d158]" placeholder="基準" /></div>
                                                    <div className="unified-input-row focus-green"><span className="unified-label-left text-[#30d158]">L2</span><input ref={slopeL2Ref} type="text" inputMode="decimal" value={format(slopeL2)} onFocus={handleFocus} onChange={(e) => setSlopeL2(unformat(e.target.value))} onKeyDown={(e) => handleEnterKey(e, slopeWRef)} className="unified-input-center text-[#30d158]" placeholder="延長" /></div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="unified-input-row focus-blue"><span className="unified-label-left text-[#0a84ff]">幅W</span><input ref={slopeWRef} type="text" inputMode="decimal" value={format(slopeW)} onFocus={handleFocus} onChange={(e) => setSlopeW(unformat(e.target.value))} onKeyDown={(e) => handleEnterKey(e, slopePitchRef)} className="unified-input-center text-[#0a84ff]" placeholder="幅" /></div>
                                                    <div className="unified-input-row focus-purple"><span className="unified-label-left text-[#bf5af2]">働き</span><input ref={slopePitchRef} type="text" inputMode="decimal" value={format(slopePitch)} onFocus={handleFocus} onChange={(e) => setSlopePitch(unformat(e.target.value))} onKeyDown={(e) => e.key === 'Enter' && e.target.blur()} className="unified-input-center text-[#bf5af2]" placeholder="ピッチ" /></div>
                                                </div>
                                                <button onClick={clearSlopeInputs} className="w-full h-10 btn-3d btn-3d-zinc text-white font-bold text-[13px]">リセット</button>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="bg-[#0a84ff15] border border-[#0a84ff44] p-3 rounded-xl text-center"><span className="block text-[12px] text-[#0a84ff] font-bold uppercase mb-1">延長後W</span><span className="text-xl font-bold text-[#0a84ff]">{format(slopeResults.newB)}</span><span className="text-[14px] ml-1 text-gray-500 uppercase">㎜</span></div>
                                                <div className="bg-[#30d15815] border border-[#30d15844] p-3 rounded-xl text-center"><span className="block text-[12px] text-[#30d158] font-bold uppercase mb-1">延長後L2</span><span className="text-xl font-bold text-[#30d158]">{format(slopeResults.newC)}</span><span className="text-[12px] ml-1 text-gray-500 uppercase">㎜</span></div>
                                                <div className="bg-[#ff9f0a15] border border-[#ff9f0a44] p-3 rounded-xl text-center"><span className="block text-[14px] text-[#ff9f0a] font-bold uppercase mb-1">区間数</span><span className="text-xl font-bold text-[#ff9f0a]">{slopeResults.count}</span><span className="text-[14px] ml-1 text-gray-500 uppercase">枚</span></div>
                                                <div className="bg-[#bf5af215] border border-[#bf5af244] p-3 rounded-xl text-center"><span className="block text-[14px] text-[#bf5af2] font-bold uppercase mb-1">増分/区間</span><span className="text-xl font-bold text-[#bf5af2]">{format(slopeResults.step)}</span><span className="text-[14px] ml-1 text-gray-500 uppercase">㎜</span></div>
                                            </div>
                                        </div>
                                        <div className="space-y-4 pl-1 md:overflow-y-auto scrollbar-hide pb-10">
                                            <div className="canvas-container shadow-2xl bg-black aspect-video cursor-pointer active:opacity-70 transition-opacity relative" onClick={openSlopeZoom}>
                                                <canvas ref={slopeCanvasRef} width="1200" height="700"></canvas>
                                            </div>
                                            <div className="ios-card-base overflow-hidden flex-shrink-0"><div className="bg-zinc-800 p-2 text-center text-[14px] font-bold text-zinc-400 uppercase">勾配寸法表</div><table className="history-table text-center w-full"><thead><tr className="bg-[#2c2c2e] sticky top-0"><th className="text-[#ff9f0a] font-bold uppercase py-2">No.</th><th className="text-[#0a84ff] font-bold uppercase py-2">働き</th><th className="text-[#30d158] font-bold uppercase py-2">長さ</th></tr></thead><tbody>{slopeResults.table.map(row => (<tr key={row.i} className="border-b border-[#38383a]"><td className="py-2 text-[#ff9f0a] font-bold text-[20px]">{row.i}</td><td className="text-[#0a84ff] font-bold text-[20px]">{format(row.dist)}</td><td className="text-[#30d158] font-bold text-[20px]">{format(row.height)}</td></tr>))}</tbody></table></div>
                                        </div>
                                    </div>
                                )}

                                {/* --- 面積計算アプリ --- */}
                                {activeApp === 'area' && (
                                    <AreaApp areaStateRef={areaStateRef} savedData={areaSavedData} setSavedData={setAreaSavedData} showToast={showToast} />
                                )}
                            </div>
                        </div>
                    </main>

                    {/* 画像拡大モーダル */}
                    {zoomedImage && (
                        <div className="fixed inset-0 z-[300] flex flex-col items-center justify-center bg-black/90 backdrop-blur-sm px-4 animate-fade-in" onClick={() => setZoomedImage(null)}>
                            <button onClick={() => setZoomedImage(null)} className="absolute top-6 right-6 bg-zinc-800 text-white rounded-full p-2 z-[310] shadow-lg border border-zinc-700 active:scale-95 transition-all"><Icon name="x" size={24} /></button>
                            <div className="w-full max-w-4xl max-h-[80vh] flex items-center justify-center overflow-hidden" onClick={(e) => e.stopPropagation()}>
                                {zoomedImage === 'tightframe' && (<div className="w-full bg-black p-4 rounded-2xl border border-zinc-700 shadow-2xl"><RoofProfileSVG size={tfSize} /></div>)}
                                {zoomedImage === 'slope' && slopeImageUrl && (<img src={slopeImageUrl} alt="Slope Zoom" className="max-w-full max-h-[80vh] object-contain rounded-xl shadow-2xl border border-zinc-700" />)}
                            </div>
                            <p className="text-zinc-500 font-bold mt-6 text-[14px]">タップして閉じる</p>
                        </div>
                    )}

                    {isClearModalOpen && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
                            <div className="bg-zinc-900 border border-zinc-700 rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-fade-in text-center">
                                <h3 className="text-[20px] font-bold text-white mb-2">履歴の全削除</h3>
                                <p className="text-zinc-400 text-[14px] mb-6 font-bold">保存履歴をすべて削除します。<br/>本当によろしいですか？</p>
                                <div className="flex gap-3"><button onClick={() => setIsClearModalOpen(false)} className="flex-1 h-12 rounded-xl font-bold btn-3d btn-3d-zinc text-white text-[16px] text-center">キャンセル</button><button onClick={() => { if(activeApp === 'alloc') { setAllocHistory([]); } else if(activeApp === 'calc') { setHistory([]); } setIsClearModalOpen(false); }} className="flex-1 h-12 rounded-xl font-bold btn-3d btn-3d-red text-white text-[16px] text-center">削除する</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
